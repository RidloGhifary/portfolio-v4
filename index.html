<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect (untuk performa) -->
    <link rel="dns-prefetch" href="https://v2.ridloghfry.web.id" />

    <!-- Preload Critical Fonts (hanya 2 font paling penting) -->
    <link
      rel="preload"
      href="/src/assets/fonts/inter/Inter_18pt-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous" />
    <link
      rel="preload"
      href="/src/assets/fonts/inter/Inter_18pt-Bold.ttf"
      as="font"
      type="font/ttf"
      crossorigin="anonymous" />

    <!-- Inline Critical CSS -->
    <style>
      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          sans-serif;
        background-color: #f8f8f8;
        color: #000000;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .loading-skeleton {
        background: linear-gradient(
          90deg,
          #f0f0f0 25%,
          #e0e0e0 50%,
          #f0f0f0 75%
        );
        background-size: 200% 100%;
        animation: loading 1.5s ease-in-out infinite;
      }
      @keyframes loading {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }
    </style>

    <!-- SEO PRIMARY -->
    <title>Ridlo Achmad Ghifary — Full-Stack Web Developer</title>

    <meta
      name="description"
      content="Portfolio Ridlo — Full-Stack Web Developer specializing in modern web development, scalable systems, and data-driven solutions." />

    <!-- Keywords (dibaca Bing, diabaikan Google — tetap boleh ada) -->
    <meta
      name="keywords"
      content="ridlo portfolio, ridlo achmad ghifary, full stack developer, react developer, web developer portfolio" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://v2.ridloghfry.web.id/" />

    <!-- OPEN GRAPH -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ridlo Portfolio" />
    <meta
      property="og:title"
      content="Ridlo Portfolio — Full-Stack Web Developer" />
    <meta
      property="og:description"
      content="Portfolio Ridlo, a Full-Stack Web Developer showcasing web projects, scalable systems, and data-driven solutions." />
    <meta property="og:url" content="https://v2.ridloghfry.web.id/" />
    <meta
      property="og:image"
      content="https://v2.ridloghfry.web.id/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- STRUCTURED DATA / JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Ridlo Achmad Ghifary",
        "url": "https://v2.ridloghfry.web.id/",
        "jobTitle": "Full-Stack Web Developer",
        "description": "Portfolio Ridlo, a Full-Stack Web Developer specializing in modern web development, scalable systems, and data-driven solutions.",
        "knowsAbout": [
          "Web Development",
          "Full-Stack Development",
          "React",
          "Node.js",
          "Scalable Systems"
        ],
        "sameAs": []
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ridlo Portfolio",
        "url": "https://v2.ridloghfry.web.id/",
        "description": "Portfolio website of Ridlo, a Full-Stack Web Developer."
      }
    </script>

    <!-- Google Site Verification -->
    <meta
      name="google-site-verification"
      content="NLLLymUz-ECx9Wrwh2VL0OkV7AsklyKtEfYP5j6Ge3g" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
